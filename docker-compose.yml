version: '3.8'

services:
  order-db:
    image: postgres:16-alpine
    container_name: order-postgres-db
    environment:
      POSTGRES_DB: db_orders
      POSTGRES_USER: usr_order
      POSTGRES_PASSWORD: pwd_order_secure123
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usr_order -d db_orders"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-springboot-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-db:5432/db_orders
      - SPRING_DATASOURCE_USERNAME=usr_order
      - SPRING_DATASOURCE_PASSWORD=pwd_order_secure123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      order-db:
        condition: service_healthy

volumes:
  postgres_data: